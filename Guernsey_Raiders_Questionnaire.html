<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guernsey Raiders Player Questionnaire</title>
<style>
  :root {
    --navy: #1a1a1a;
    --green: #4a7c2f;
    --gold: #f0c419;
    --bg: #f5f4f1;
    --card: #ffffff;
    --text: #1b1b1b;
    --muted: #6b6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 0 0 60px;
  }
  header {
    background: var(--navy);
    color: white;
    padding: 24px 24px 20px;
    text-align: center;
    border-bottom: 5px solid var(--gold);
  }
  header img {
    height: 90px;
    margin-bottom: 10px;
  }
  header h1 {
    margin: 0 0 6px;
    font-size: 1.6rem;
    letter-spacing: 0.5px;
  }
  header p {
    margin: 0;
    color: #d8d8d8;
    font-size: 0.95rem;
  }
  form {
    max-width: 720px;
    margin: 30px auto;
    padding: 0 16px;
  }
  .card {
    background: var(--card);
    border-radius: 10px;
    padding: 22px 26px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .card h2 {
    font-size: 1.05rem;
    color: var(--navy);
    border-left: 4px solid var(--green);
    padding-left: 10px;
    margin-top: 0;
  }
  label {
    display: block;
    font-weight: 600;
    margin: 16px 0 6px;
    font-size: 0.95rem;
  }
  label.optional::after {
    content: " (optional)";
    font-weight: 400;
    color: var(--muted);
    font-size: 0.85em;
  }
  input[type="text"], input[type="number"], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 0.95rem;
    font-family: inherit;
    resize: vertical;
  }
  textarea { min-height: 70px; }
  .radio-group {
    display: flex;
    gap: 18px;
    margin-top: 4px;
  }
  .radio-group label {
    font-weight: 400;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hint {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 2px;
  }
  button {
    background: var(--green);
    color: white;
    border: none;
    padding: 14px 28px;
    font-size: 1rem;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    font-weight: 700;
  }
  button:hover { background: #3c6526; }
  #confirmation {
    display: none;
    max-width: 720px;
    margin: 40px auto;
    padding: 30px;
    text-align: center;
    background: var(--card);
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  #confirmation h2 { color: var(--navy); }
  .download-link {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 20px;
    background: var(--gold);
    color: var(--navy);
    border-radius: 6px;
    text-decoration: none;
    font-weight: 700;
  }
</style>
</head>

  <h1>Guernsey Raiders RFC</h1>
  <p>End-of-Season Player Questionnaire</p>
</header>

<form id="questionnaire" action="https://formspree.io/f/xaqgqvpv" method="POST">

  <div class="card">
    <h2>About You</h2>
    <label class="optional" for="name">Name</label>
    <input type="text" id="name" name="name">

    <label for="team">Team</label>
    <input type="text" id="team" name="team" required>
  </div>

  <div class="card">
    <h2>Team Reflection</h2>

    <label for="q1">Summarise last season in 3 words.</label>
    <input type="text" id="q1" name="q1" required>

    <label for="q2">Where did we excel? Why?</label>
    <textarea id="q2" name="q2" required></textarea>

    <label for="q3">Where did we fall short? Why?</label>
    <textarea id="q3" name="q3" required></textarea>

    <label for="q4">What is the Guernsey Raiders' identity?</label>
    <textarea id="q4" name="q4" required></textarea>

    <label for="q5">What do we want the Guernsey Raiders identity to be?</label>
    <textarea id="q5" name="q5" required></textarea>

    <label>Do you think the Guernsey Raiders has a supportive team environment?</label>
    <div class="radio-group">
      <label><input type="radio" name="q6" value="Yes" required> Yes</label>
      <label><input type="radio" name="q6" value="No"> No</label>
      <label><input type="radio" name="q6" value="Somewhat"> Somewhat</label>
    </div>

    <label for="q7">How many gym sessions are you doing a week?</label>
    <input type="number" id="q7" name="q7" min="0" max="14" required>

    <label for="q8">How many additional fitness sessions are you doing a week?</label>
    <input type="number" id="q8" name="q8" min="0" max="14" required>

    <label for="q9">What does a successful season look like this season?</label>
    <textarea id="q9" name="q9" required></textarea>

    <label for="q10">Where do you think Guernsey Raiders could finish given the players we have?</label>
    <input type="text" id="q10" name="q10" required>

    <label for="q11">Where do you think Guernsey Raiders will finish? Why?</label>
    <textarea id="q11" name="q11" required></textarea>
  </div>

  <div class="card">
    <h2>Personal</h2>

    <label for="q12">What area of your game improved last year, if any?</label>
    <textarea id="q12" name="q12"></textarea>

    <label for="q13">What area of your game do you want to improve most this year?</label>
    <textarea id="q13" name="q13" required></textarea>

    <label for="q14">How will you achieve this? What support do you require from teammates and coaches?</label>
    <textarea id="q14" name="q14" required></textarea>
  </div>

  <button type="submit">Submit Questionnaire</button>
</form>

<div id="confirmation">
  <h2>Thanks — response recorded</h2>
  <p>Your answers have been compiled below. Download a copy or take a screenshot to send to your coach.</p>
  <a class="download-link" id="downloadLink" href="#" download="raiders_questionnaire_response.txt">Download my answers (.txt)</a>
</div>

<script>
document.getElementById('questionnaire').addEventListener('submit', function(e) {
  e.preventDefault();
  const form = e.target;
  const data = new FormData(form);
  const labels = {
    name: "Name", team: "Team",
    q1: "Summarise last season in 3 words",
    q2: "Where did we excel? Why?",
    q3: "Where did we fall short? Why?",
    q4: "What is the Guernsey Raiders' identity?",
    q5: "What do we want the Guernsey Raiders identity to be?",
    q6: "Supportive team environment?",
    q7: "Gym sessions per week",
    q8: "Additional fitness sessions per week",
    q9: "What does a successful season look like?",
    q10: "Where could Raiders finish (given players)?",
    q11: "Where will Raiders finish? Why?",
    q12: "Area of game improved last year",
    q13: "Area of game to improve most this year",
    q14: "How will you achieve this / support required"
  };
  let output = "GUERNSEY RAIDERS RFC — PLAYER QUESTIONNAIRE\n" + "=".repeat(44) + "\n\n";
  for (const key in labels) {
    const val = data.get(key) || "(no answer)";
    output += labels[key] + ":\n" + val + "\n\n";
  }

  const submitBtn = form.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.textContent = "Submitting...";

  fetch(form.action, {
    method: 'POST',
    body: data,
    headers: { 'Accept': 'application/json' }
  })
  .then(response => {
    form.style.display = 'none';
    document.getElementById('confirmation').style.display = 'block';
    if (!response.ok) {
      document.getElementById('confirmation').querySelector('p').textContent =
        "Your answers were recorded locally, but there was an issue sending them automatically. Please download a copy below and send it to your coach directly.";
    }
  })
  .catch(() => {
    form.style.display = 'none';
    document.getElementById('confirmation').style.display = 'block';
    document.getElementById('confirmation').querySelector('p').textContent =
      "Your answers were recorded locally, but there was an issue sending them automatically. Please download a copy below and send it to your coach directly.";
  });

  const blob = new Blob([output], {type: 'text/plain'});
  document.getElementById('downloadLink').href = URL.createObjectURL(blob);
});
</script>

</body>
</html>
